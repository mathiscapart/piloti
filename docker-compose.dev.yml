# Piloti — override dev. À utiliser avec :
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Diff prod :
#   - port 3000 exposé sur la machine hôte
#   - bind mount du code source (hot reload)
#   - target=dev (lance `pnpm dev`, pas `node server.js`)
#   - cloudflared et traefik désactivés (override avec `profiles: [never]`)
#   - DB sur le filesystem local plutôt qu'un volume nommé
#
# NB : pour la plupart des workflows dev, lance simplement `pnpm dev` en local.
# Ce fichier sert si tu veux reproduire l'env conteneurisé pendant le dev.

services:
  migrate:
    profiles: ["never"]

  app:
    build:
      target: dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      # DB dev = fichier SQLite bind-mounté depuis l'hôte (./dev.db). AUCUN
      # accès au volume nommé `piloti-data` de la prod.
      DATABASE_URL: file:/app/dev.db
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dev-secret-32-chars-minimum-aaaaaa}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
    # Remplace complètement les volumes hérités du compose de base (qui
    # montent `piloti-data:/data` et `piloti-uploads:/app/public/uploads`).
    # On garde uniquement le bind mount du code + anonymous volumes pour
    # préserver les node_modules et .next compilés dans l'image dev.
    volumes: !override
      - ./:/app
      - /app/node_modules
      - /app/.next
    # Annule la dépendance prod sur le service `migrate` (disabled via profil)
    depends_on: !reset null
    networks: !reset null
    # Sans ça, le container dev hérite des labels traefik du compose de base
    # et entre en conflit avec le router `piloti` du container prod (même
    # règle Host) → traefik invalide tout et renvoie 404 sur la prod.
    labels: !reset null

  traefik:
    profiles: ["never"]

  cloudflared:
    profiles: ["never"]
